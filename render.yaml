services:
  - type: web
    name: global-city-insights-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    plan: free
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000
      - key: CLIENT_ORIGIN
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: OPENAQ_API_KEY
        sync: false
      - key: GEODB_API_KEY
        sync: false
      - key: GEODB_API_HOST
        value: wft-geo-db.p.rapidapi.com
      - key: SNAPSHOT_RETENTION_DAYS
        value: 15
      - key: REFRESH_CRON
        value: "*/30 * * * *"
